<!DOCTYPE html><html lang="ja"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
:root{--bg:#ffffff;--card:#fff;--soft:#f4f6fa;--line:#d9dee6;--ink:#222222;--sub:#444444;--mut:#777777;

*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-size:15px;
font-family:Meiryo,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;line-height:1.8}
.wrap{max-width:920px;margin:0 auto;padding:24px 18px 48px}
h1{font-size:24px;font-weight:700;margin:0 0 4px}.meta{color:var(--sub);font-size:14px;margin:0 0 18px}
.tilt{display:inline-block;font-size:12px;padding:3px 10px;border-radius:12px;background:var(--accentbg);color:var(--accent);margin-left:8px}
.cmpwrap{margin:0 0 8px;overflow-x:auto}
.cmpgrid{display:grid;grid-template-columns:88px repeat(4,minmax(0,1fr));gap:8px;min-width:640px}
.ch{font-size:13.5px;color:var(--accent);text-align:center;font-weight:700;padding:0 2px 6px;display:flex;align-items:flex-end;justify-content:center;line-height:1.3}
.rl{font-size:14px;font-weight:700;color:var(--ink);display:flex;flex-direction:column;justify-content:center;line-height:1.35;overflow:hidden}
.rl .sm{color:var(--mut);font-size:12px;font-weight:400;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
.cell{border:1px solid var(--line);border-radius:8px;padding:12px 6px;font-size:14px;text-align:center;

.cell.case{background:var(--soft);color:var(--sub)}
.cell.endup{background:var(--okbg);color:var(--ok);font-weight:600}
.cell.enddn{background:var(--dnbg);color:var(--dn);font-weight:600}
.cell.done{color:var(--sub)}
.cell.now{border:2px solid var(--warn);background:var(--warnbg);color:var(--warn);font-weight:600}
.cell.future{color:var(--mut);border-style:dashed}
.cell.colactive{outline:2px solid var(--accent);outline-offset:1px}
.nowtag{font-size:11px;margin-top:3px;opacity:.9}
.who{display:inline-block;font-size:12px;padding:2px 9px;border-radius:4px;background:var(--accentbg);color:var(--accent);font-weight:700}
.story{margin:0 0 26px}
.story .row{display:flex;gap:14px;padding:16px 0;border-bottom:1px solid var(--soft)}
.story .num{flex-shrink:0;width:32px;height:32px;border-radius:50%;background:var(--accent);color:#fff;
font-size:16px;font-weight:700;display:flex;align-items:center;justify-content:center;margin-top:2px}
.story .lbl{font-size:16px;color:var(--accent);font-weight:700;margin:0 0 5px}
.story .txt{font-size:17px;line-height:1.9;margin:0;color:var(--ink)}
.secttl{font-size:17px;color:var(--accent);font-weight:700;margin:26px 0 10px;
border-bottom:3px solid var(--accent);padding-bottom:5px;display:inline-block}
.hint{font-size:13px;color:var(--sub);margin:6px 0 18px}
#panel{background:var(--card);border:1px solid var(--line);border-radius:12px;padding:18px 20px;min-height:160px}
.ph{font-size:18px;font-weight:700;margin:0 0 4px}.pn{font-size:13px;color:var(--mut);margin:0 0 12px}
.gt{font-size:14.5px;font-weight:700;color:var(--accent);margin:16px 0 8px;border-bottom:1px solid var(--line);padding-bottom:5px}
.item{font-size:14.5px;padding:8px 0;border-bottom:1px solid var(--soft)}
.item .d{color:var(--mut);font-size:12.5px}.item a{color:var(--accent);text-decoration:none}
.kv{display:flex;font-size:14.5px;padding:6px 0}.kv .k{color:var(--sub);width:34%;flex-shrink:0}
.badge{display:inline-block;font-size:12px;padding:1px 7px;border-radius:4px;background:var(--mutbg);color:var(--sub);margin-right:6px}
.foot{font-size:12.5px;color:var(--mut);margin-top:22px;line-height:1.9}
</style></head><body><div class="wrap">
<p style="margin:0 0 14px"><a href="../index.html" style="color:var(--accent);text-decoration:none;

<h1 id="h1"></h1><p class="meta" id="meta"></p>

<p class="foot">方向(上/下)は断定しない。本カードは公開事実とパターンの提示であり、投資助言ではない。
変動予報はフォワードテスト検証済（過去の全時点でスキャンを再現し採点）: 注目上位20は2週間以内に
±10%以上動いた割合53%（同条件の無作為選択の約2.8倍）、±25%級の大変動でも約5倍。
方向(上/下)は示さない。
出典: EDINET大量保有報告 / 報道見出し。最終判断はご自身で。</p>
</div>

function esc(s){return (s==null?'':String(s)).replace(/[&<>]/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;'}[c];});}
function trunc(s,n){s=String(s==null?'':s);return s.length>n?s.slice(0,n)+'…':s;}
function renderItems(g){
 if(g.type==='holdings'){
  if(!g.items.length)return '<div class="item" style="color:var(--mut)">該当する大量保有報告なし</div>';
  return g.items.map(function(it){
   return '<div class="item"><span class="badge">'+esc(it.kind)+'</span><span class="badge">'+esc(it.filer_kind)+'</span>'+
   esc(it.filer)+(it.ratio?' <span class="d">保有割合 '+esc(it.ratio)+'</span>':'')+
   '<div class="d">提出日 '+esc(it.date)+(it.doc?' ・ docID '+esc(it.doc):'')+'</div>'+
   (it.excerpt?'<div class="d">'+esc(it.excerpt)+'</div>':'')+'</div>';
  }).join('');
 }
 if(g.type==='tm'){
  if(!g.items.length)return '<div class="item" style="color:var(--mut)">直近3年の商標出願なし</div>';
  return g.items.map(function(it){
   return '<div class="item"><span class="badge">商標</span>'+esc(it.name)+
   (it.klass?' <span class="d">区分: '+esc(it.klass)+'</span>':'')+
   '<div class="d">出願日 '+esc(it.date)+'</div></div>';
  }).join('');
 }
 if(g.type==='pat'){
  if(!g.items.length)return '<div class="item" style="color:var(--mut)">直近3年の特許出願なし</div>';
  return g.items.map(function(it){
   return '<div class="item"><span class="badge">特許</span>'+esc(it.name)+
   '<div class="d">出願日 '+esc(it.date)+'</div></div>';
  }).join('');
 }
 if(g.type==='news'){
  if(!g.items.length)return '<div class="item" style="color:var(--mut)">該当する材料見出しなし</div>';
  return g.items.map(function(it){
   var t=it.url?'<a href="'+esc(it.url)+'" target="_blank" rel="noopener">'+esc(it.title)+'</a>':esc(it.title);
   return '<div class="item"><span class="badge">'+esc(it.cat)+'</span>'+t+
   '<div class="d">'+esc(it.date)+(it.source?' ・ '+esc(it.source):'')+'</div></div>';
  }).join('');
 }
 return g.items.map(function(kv){return '<div class="kv"><span class="k">'+esc(kv[0])+'</span><span>'+esc(kv[1])+'</span></div>';}).join('');

function render(row,k){
 var src=row==='case'?DATA.details_case:DATA.details_target;
 var who=row==='case'?'先例':'今の株';
 var p=document.getElementById('panel');
 if(!src){p.innerHTML='<p class="ph">先例なし</p><p class="pn">この銘柄は方向が定まる先例が無い（特段の兆候なし）。</p>';return;}
 var d=src[k];
 var h='<p class="pn"><span class="who">'+who+'</span> の根拠</p><p class="ph">'+esc(d.h)+'</p><p class="pn">'+esc(d.note)+'</p>';
 d.groups.forEach(function(g){h+='<div class="gt">'+esc(g.gtitle)+'</div>'+renderItems(g);});
 p.innerHTML=h;
 var col=String(+k-1);
 document.querySelectorAll('#cmp [data-col]').forEach(function(c){
  c.classList.toggle('colactive',c.dataset.row===row&&c.dataset.col===col);});
}
(function(){
 document.getElementById('h1').textContent=DATA.name+'（'+DATA.stock+'）';
 document.getElementById('meta').innerHTML=esc(DATA.asof)+' 時点 ・ 型: '+esc(DATA.type)+
  '<span class="tilt">'+esc(DATA.tilt_tag)+'</span>';
 var st=document.getElementById('story');
 (DATA.narrative||[]).forEach(function(row,i){
  st.innerHTML+='<div class="row"><div class="num">'+(i+1)+'</div><div><p class="lbl">'+
   esc(row[0])+'</p><p class="txt">'+esc(row[1])+'</p></div></div>';
 });
 var c=DATA.compare,cmp=document.getElementById('cmp'),marks=['①','②','③','④'];
 var h='<div class="rl"></div>';
 c.headers.forEach(function(hd,i){h+='<div class="ch">'+marks[i]+' '+esc(hd)+'</div>';});
 if(c.case){
  h+='<div class="rl">先例<span class="sm" title="'+esc(c.case.name)+'">'+esc(trunc(c.case.name,6))+'</span></div>';
  c.case.cells.forEach(function(t,i){
   var cls='cell case'+(i===3?(c.case.dir==='暴騰'?' endup':' enddn'):'');
   h+='<div class="'+cls+'" data-row="case" data-col="'+i+'">'+esc(t)+'</div>';
  });
 }
 h+='<div class="rl">今の株<span class="sm">'+esc(DATA.stock)+'</span></div>';
 c.target.cells.forEach(function(cell,i){
  h+='<div class="cell '+cell.state+'" data-row="target" data-col="'+i+'">'+esc(cell.t)+
   (cell.state==='now'?'<div class="nowtag">今ここ</div>':'')+'</div>';
 });
 cmp.innerHTML=h;
 cmp.querySelectorAll('[data-col]').forEach(function(el){
  el.addEventListener('click',function(){render(el.dataset.row,String(+el.dataset.col+1));});});
 document.getElementById('hint').textContent='上段＝先例が辿った道（緑=上で終了/赤=下で終了）。下段＝この株の今（橙=今ここ／点線=この先）。各段のコマをクリックすると、その段の出典付き根拠が出ます。';
